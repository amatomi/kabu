<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本株 当日ランキング</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">Stock Ranking</div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active" data-theme="値上がり率">値上がり率</button>
                <button class="nav-btn" data-theme="値下がり率">値下がり率</button>
                <button class="nav-btn" data-theme="値上がり幅">値上がり幅</button>
                <button class="nav-btn" data-theme="値下がり幅">値下がり幅</button>
                <button class="nav-btn" data-theme="出来高">出来高</button>
                <button class="nav-btn" data-theme="売買代金">売買代金</button>
                <button class="nav-btn" data-theme="配当利回り">配当利回り</button>
                <button class="nav-btn" data-theme="高PER">高PER</button>
                <button class="nav-btn" data-theme="低PER">低PER</button>
                <button class="nav-btn" data-theme="高PBR">高PBR</button>
                <button class="nav-btn" data-theme="低PBR">低PBR</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="app-header">
                <div>
                    <h1>日本株 当日ランキング</h1>
                    <div id="data-retrieval-time" class="retrieval-time-badge">データ取得時間: --</div>
                </div>
            </header>

            <div class="table-card">
                <div class="table-header">
                    <h2 id="current-theme-title">値上がり率</h2>
                    <span class="update-info">取得元: 株探 (本日)</span>
                </div>
                <div class="table-responsive">
                    <table id="stock-table">
                        <thead>
                            <tr>
                                <th>順位</th>
                                <th>コード</th>
                                <th>銘柄名</th>
                                <th class="num-col">株価</th>
                                <th class="num-col">前日比</th>
                                <th class="num-col col-yield">配当利回り</th>
                                <th class="num-col">PER</th>
                                <th class="num-col">PBR</th>
                                <th class="num-col col-volume">出来高/代金</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Data will be injected here -->
                        </tbody>
                    </table>
                    <div id="loading-indicator" class="loading-indicator" style="display: none;">
                        さらに読み込み中...
                    </div>
                </div>
            </div>

            <footer>
                <p>&copy; 2026 Stock Ranking Viewer. All data sourced from Kabutan.</p>
            </footer>
        </main>
    </div>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
